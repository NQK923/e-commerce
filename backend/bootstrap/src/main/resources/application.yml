spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ecommerce}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_MAX_POOL_SIZE:2}
      minimum-idle: ${DB_MIN_IDLE:0}
      connection-timeout: ${DB_CONNECTION_TIMEOUT:60000}
      data-source-properties:
        preferQueryMode: simple
        prepareThreshold: 0
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    baseline-version: 1
    connect-retries: ${FLYWAY_CONNECT_RETRIES:5}
    connect-retries-interval: ${FLYWAY_CONNECT_RETRIES_INTERVAL:PT5S}
    locations:
      - classpath:db/migration
    validate-on-migrate: ${FLYWAY_VALIDATE_ON_MIGRATE:true}
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/ecommerce}
      database: ${MONGO_DATABASE:ecommerce}
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dummy}
            client-secret: ${GOOGLE_CLIENT_SECRET:dummy}
            scope:
              - openid
              - profile
              - email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"

      resourceserver:
        jwt:
          issuer-uri: https://accounts.google.com
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    from: ${MAIL_FROM:no-reply@example.com}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info,metrics
  tracing:
    sampling:
      probability: 1.0
  health:
    elasticsearch:
      enabled: ${MANAGEMENT_HEALTH_ELASTICSEARCH_ENABLED:false}
    db:
      enabled: true
    redis:
      enabled: true
    mongo:
      enabled: true

frontend:
  origin: ${FRONTEND_ORIGIN:http://localhost:3000}
  origins: ${FRONTEND_ORIGINS:${FRONTEND_ORIGIN:http://localhost:3000},http://127.0.0.1:3000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:${FRONTEND_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,X-Requested-With,Cache-Control}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}

identity:
  seed:
    admin:
      enabled: ${IDENTITY_SEED_ADMIN_ENABLED:false}
      email: ${IDENTITY_SEED_ADMIN_EMAIL:}
      password: ${IDENTITY_SEED_ADMIN_PASSWORD:}
  oauth2:
    dev-callback-enabled: ${IDENTITY_OAUTH2_DEV_CALLBACK_ENABLED:false}

vnpay:
  tmn-code: ${VNPAY_TMN_CODE:demo}
  hash-secret: ${VNPAY_HASH_SECRET:demo}
  pay-url: ${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
  return-url: ${VNPAY_RETURN_URL:http://localhost:8080/api/payments/vnpay/return}
  dev-return-enabled: ${VNPAY_DEV_RETURN_ENABLED:false}

search:
  elasticsearch:
    host: ${SEARCH_ELASTIC_HOST:http://localhost:9200}
    username: ${SEARCH_ELASTIC_USERNAME:}
    password: ${SEARCH_ELASTIC_PASSWORD:}
    index: ${SEARCH_ELASTIC_INDEX:products}

logging:
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
