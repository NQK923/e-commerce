name: E-Commerce CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Build and Test Backend
      run: ./gradlew build

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: e-commerce-frontend/package-lock.json
        
    - name: Install dependencies
      working-directory: e-commerce-frontend
      run: npm ci
      
    - name: Lint
      working-directory: e-commerce-frontend
      run: npm run lint
      
    - name: Build
      working-directory: e-commerce-frontend
      run: npm run build
      
    - name: Install Playwright Browsers
      working-directory: e-commerce-frontend
      run: npx playwright install --with-deps
      
    - name: Run Playwright tests
      working-directory: e-commerce-frontend
      run: npx playwright test
